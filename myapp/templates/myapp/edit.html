<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>日報の編集</title>
    <style>
        :root {
            --bg: #eff5fb;
            --panel: rgba(255, 255, 255, 0.88);
            --line: rgba(68, 101, 142, 0.14);
            --text: #13253d;
            --muted: #61738f;
            --accent: #62d4ff;
            --accent-soft: #a7edff;
            --radius-xl: 28px;
            --radius-md: 14px;
            --shadow: 0 24px 60px rgba(25, 51, 84, 0.12);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Avenir Next", "Hiragino Sans", "Yu Gothic", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(98, 212, 255, 0.18), transparent 30%),
                radial-gradient(circle at bottom right, rgba(255, 184, 107, 0.12), transparent 24%),
                linear-gradient(135deg, #f8fbff 0%, #eef4fa 42%, #e7eef7 100%);
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .editor-shell {
            width: min(760px, 100%);
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: var(--radius-xl);
            padding: 34px;
            backdrop-filter: blur(16px);
            box-shadow: var(--shadow);
        }

        .kicker {
            margin: 0 0 8px;
            color: var(--accent);
            font-size: 0.84rem;
            letter-spacing: 0.14em;
            text-transform: uppercase;
        }

        h1 {
            margin: 0 0 10px;
            font-size: clamp(1.8rem, 5vw, 2.7rem);
        }

        .lead {
            margin: 0 0 26px;
            color: var(--muted);
            line-height: 1.8;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.92rem;
            font-weight: 600;
        }

        input,
        textarea {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: var(--radius-md);
            padding: 14px 16px;
            margin: 0 0 20px;
            background: rgba(248, 251, 255, 0.92);
            color: var(--text);
            font: inherit;
            transition: border-color 0.25s ease, transform 0.25s ease, background 0.25s ease;
        }

        input:focus,
        textarea:focus {
            outline: none;
            border-color: rgba(98, 212, 255, 0.65);
            background: rgba(255, 255, 255, 0.98);
            transform: translateY(-1px);
        }

        textarea {
            min-height: 220px;
            resize: vertical;
            line-height: 1.8;
        }

        .actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 8px;
        }

        .button,
        .button-secondary {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 999px;
            padding: 13px 20px;
            text-decoration: none;
            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }

        .button {
            border: none;
            cursor: pointer;
            font: inherit;
            font-weight: 700;
            color: #04111f;
            background: linear-gradient(135deg, var(--accent), var(--accent-soft));
            box-shadow: 0 14px 30px rgba(98, 212, 255, 0.24);
        }

        .button-secondary {
            color: var(--text);
            background: rgba(255, 255, 255, 0.74);
            border: 1px solid var(--line);
        }

        .button:hover,
        .button-secondary:hover {
            transform: translateY(-2px);
        }

        @media (max-width: 640px) {
            .editor-shell {
                padding: 24px;
                border-radius: 22px;
            }

            .actions {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="editor-shell">
        <p class="kicker">Edit Report</p>
        <h1>日報を編集</h1>
        <p class="lead">投稿済みのタイトルと内容を整えて、一覧画面にすぐ反映できます。</p>

        <form method="POST">
            {% csrf_token %}

            <label>タイトル</label>
            <input type="text" name="title" value="{{ report.title }}" required>

            <label>内容</label>
            <textarea name="content" rows="6" required>{{ report.content }}</textarea>

            <div class="actions">
                <button type="submit" class="button">変更を保存する</button>
                <a href="{% url 'index' %}" class="button-secondary">一覧へ戻る</a>
            </div>
        </form>
    </div>
</body>
</html>
