<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ログイン</title>
    <style>
        :root {
            --bg: #eff5fb;
            --panel: rgba(255, 255, 255, 0.88);
            --line: rgba(68, 101, 142, 0.14);
            --text: #13253d;
            --muted: #61738f;
            --accent: #62d4ff;
            --accent-soft: #a7edff;
            --shadow: 0 24px 60px rgba(25, 51, 84, 0.12);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            color: var(--text);
            font-family: "Avenir Next", "Hiragino Sans", "Yu Gothic", sans-serif;
            background:
                radial-gradient(circle at top left, rgba(98, 212, 255, 0.18), transparent 28%),
                radial-gradient(circle at bottom right, rgba(255, 184, 107, 0.12), transparent 26%),
                linear-gradient(135deg, #f8fbff 0%, #eef4fa 42%, #e7eef7 100%);
        }

        .login-shell {
            width: min(460px, 100%);
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 28px;
            padding: 34px;
            backdrop-filter: blur(16px);
            box-shadow: var(--shadow);
        }

        .kicker {
            margin: 0 0 8px;
            color: var(--accent);
            font-size: 0.82rem;
            letter-spacing: 0.14em;
            text-transform: uppercase;
        }

        h1 {
            margin: 0 0 10px;
            font-size: clamp(1.8rem, 5vw, 2.4rem);
        }

        .lead {
            margin: 0 0 24px;
            color: var(--muted);
            line-height: 1.7;
        }

        p {
            margin: 0 0 16px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.92rem;
            font-weight: 600;
        }

        input {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 14px;
            padding: 14px 16px;
            background: rgba(248, 251, 255, 0.92);
            color: var(--text);
            font: inherit;
        }

        input:focus {
            outline: none;
            border-color: rgba(98, 212, 255, 0.65);
            background: rgba(255, 255, 255, 0.98);
        }

        ul.errorlist {
            margin: 0 0 14px;
            padding-left: 18px;
            color: #ffb4b4;
        }

        .button {
            width: 100%;
            border: none;
            border-radius: 999px;
            padding: 14px 18px;
            cursor: pointer;
            font: inherit;
            font-weight: 700;
            color: #04111f;
            background: linear-gradient(135deg, var(--accent), var(--accent-soft));
            box-shadow: 0 14px 30px rgba(98, 212, 255, 0.24);
            transition: transform 0.25s ease;
        }

        .button:hover {
            transform: translateY(-2px);
        }

        @media (max-width: 640px) {
            .login-shell {
                padding: 24px;
                border-radius: 22px;
            }
        }
    </style>
</head>
<body>
    <div class="login-shell">
        <p class="kicker">Secure Access</p>
        <h1>ログイン</h1>
        <p class="lead">業務日報ダッシュボードへアクセスするには、アカウント情報を入力してください。</p>

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="button">ログインする</button>
        </form>
    </div>
</body>
</html>
